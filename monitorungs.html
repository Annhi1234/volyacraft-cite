<!DOCTYPE html>
<html lang="ua">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VolyaCraft | Моніторинги</title>
<link rel="icon" type="image/x-icon" href="ava.ico">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
    min-height: 100vh;
    color: white;
    text-align: center;
    background: linear-gradient(to top, 
        #ffaa00 0%, 
        #ffaa00 15%, 
        #e6a100 25%, 
        #cc9900 35%, 
        #4da6ff 60%, 
        #0057b7 85%, 
        #003d7a 100%
    );
    background-attachment: fixed;
    position: relative;
}

body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.2);
    pointer-events: none;
    z-index: 0;
}

header {
    padding: 60px 20px 30px;
    position: relative;
    z-index: 1;
}

header h1 {
    font-size: 4.5rem;
    margin-bottom: 15px;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
    font-weight: 800;
}

header p {
    font-size: 1.4rem;
    opacity: 0.95;
    margin-bottom: 15px;
    display: inline-block;
    padding: 8px 25px;
    background: rgba(0, 0, 0, 0.15);
    border-radius: 50px;
}

.button-group {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 15px;
    margin: 30px 0 20px;
}

button {
    padding: 14px 28px;
    font-size: 1.1rem;
    font-weight: 600;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.25s ease;
    background: rgba(0, 0, 0, 0.2);
    color: white;
    border: 1px solid rgba(255, 255, 255, 0.2);
    min-width: 160px;
}

button:hover {
    transform: scale(1.06);
    background: rgba(0, 0, 0, 0.35);
}

.discord-btn { border-left: 3px solid #5865F2; }
.donate-btn { border-left: 3px solid #ffaa00; }
.map-btn { border-left: 3px solid #03A9F4; }
.disflip-btn { border-left: 3px solid #ff6b6b; }
.allmc-btn { border-left: 3px solid #73ffda; }
.home-btn { border-left: 3px solid #ffffff; }

footer {
    padding: 15px;
    font-size: 0.95rem;
    opacity: 0.9;
    position: relative;
    z-index: 1;
}
</style>
</head>

<body>

<header>
    <h1>Моніторинги</h1>
    <p>Моніторинги де є VolyaCraft</p>
</header>

<div class="button-group">
    <button class="home-btn" onclick="goHome()">Головна</button>
    <button class="disflip-btn" onclick="joinDisflip()">Disflip</button>
    <button class="allmc-btn" onclick="joinAllmc()">Allmc</button>
</div>

<footer>
    © 2025 - 2026 VolyaCraft | Всі права захищені
</footer>

<script>
function joinDisflip() {
    window.open("https://disflip.com/guild/1414285364415299809", "_blank");
}

function joinAllmc() {
    window.open("https://allmc.in.ua/volyacraft-pp-ua-20020", "_blank");
}

function goHome() {
    window.location.href = "index.html";
}
</script>

</body>
</html>
