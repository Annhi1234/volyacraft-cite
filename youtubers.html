<!DOCTYPE html>
<html lang="ua">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VolyaCraft | Канали</title>
<link rel="icon" type="image/x-icon" href="ava.ico">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
    min-height: 100vh;
    color: white;
    text-align: center;
    background: linear-gradient(to top, 
        #ffaa00 0%, 
        #ffaa00 15%, 
        #e6a100 25%, 
        #cc9900 35%, 
        #4da6ff 60%, 
        #0057b7 85%, 
        #003d7a 100%
    );
    background-attachment: fixed;
    position: relative;
}

body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.2);
    pointer-events: none;
    z-index: 0;
}

header {
    padding: 60px 20px 30px;
    position: relative;
    z-index: 1;
}

header h1 {
    font-size: 4.5rem;
    margin-bottom: 15px;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
    font-weight: 800;
}

header p {
    font-size: 1.4rem;
    opacity: 0.95;
    margin-bottom: 15px;
    display: inline-block;
    padding: 8px 25px;
    background: rgba(0, 0, 0, 0.15);
    border-radius: 50px;
}

.cards-container {
    display: flex;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    gap: 25px;
    max-width: 900px;
    margin: 30px auto 40px;
    padding: 0 20px;
    position: relative;
    z-index: 1; 
}

.yt-card {
    background: rgba(0, 0, 0, 0.25);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 20px;
    padding: 25px;
    width: 280px;
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    transition: all 0.3s ease;
    text-decoration: none;
    color: white;
    backdrop-filter: blur(5px);
}

.yt-card:hover {
    transform: translateY(-8px) scale(1.03);
    background: rgba(0, 0, 0, 0.4);
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
}

.card-1 { border-left: 4px solid #ff6b6b; }
.card-2 { border-left: 4px solid #73ffda; }

.yt-avatar {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    margin-bottom: 15px;
    border: 3px solid rgba(255, 255, 255, 0.2);
    object-fit: cover;
    background-color: rgba(0, 0, 0, 0.1);
}

.yt-name {
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 5px;
}

.yt-subtext {
    font-size: 0.9rem;
    opacity: 0.7;
}

.nav-container {
    margin-bottom: 20px;
    position: relative;
    z-index: 1;
}

.back-btn { 
    padding: 12px 28px;
    font-size: 1rem;
    font-weight: 600;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.25s ease;
    background: rgba(0, 0, 0, 0.2);
    color: white;
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-left: 3px solid #5865F2; 
}

.back-btn:hover {
    transform: scale(1.06);
    background: rgba(0, 0, 0, 0.35);
}

footer {
    padding: 15px;
    font-size: 0.95rem;
    opacity: 0.9;
    position: relative;
    z-index: 1;
}
</style>
</head>

<body>

<header>
    <h1>Наші Канали</h1>
    <p>YouTube контент від VolyaCraft</p>
</header>

<div class="nav-container">
    <button class="back-btn" onclick="goHome()">← На головну</button>
</div>

<div class="cards-container">
    
    <a href="https://youtube.com/channel/UCEMTaOMJFGrMlSZwsj-6jKg/" target="_blank" class="yt-card card-1">
        <img class="yt-avatar" src="https://cms.googleusercontent.com/wcm/channels/UCEMTaOMJFGrMlSZwsj-6jKg/photo.jpg" alt="Avatar" onerror="this.src='https://www.youtube.com/favicon.ico'">
        <div class="yt-name">DIO_BRANDUA_UA</div>
        <div class="yt-subtext">Дивитись на YouTube ↗</div>
    </a>

    <a href="https://www.youtube.com/@Gatorik" target="_blank" class="yt-card card-2">
        <img class="yt-avatar" id="gatorik-img" src="https://www.youtube.com/favicon.ico" alt="Avatar">
        <div class="yt-name">Gatorik</div>
        <div class="yt-subtext">Дивитись на YouTube ↗</div>
    </a>

</div>

<footer>
    © 2025 - 2026 VolyaCraft | Всі права захищені
</footer>

<script>
function goHome() {
    window.location.href = "index.html";
}

document.addEventListener("DOMContentLoaded", function() {
    document.getElementById('gatorik-img').src = "https://api.dicebear.com/7.x/bottts/svg?seed=Gatorik";
});
</script>

</body>
</html>
